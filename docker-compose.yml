version: '3.9'

name: kp25-smart-community

services:
  # ============================================================
  # PORTAL - Người dân (Next.js)
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kp25-web
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    networks:
      - kp25-net
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web.rule=Host(`kp25.longtruong.gov.vn`)'

  # ============================================================
  # ADMIN - Cán bộ (Next.js)
  # ============================================================
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: kp25-admin
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    networks:
      - kp25-net
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.admin.rule=Host(`admin.kp25.longtruong.gov.vn`)'

  # ============================================================
  # NGINX - Reverse proxy (local dev)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: kp25-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - admin
    restart: unless-stopped
    networks:
      - kp25-net
    profiles:
      - production

  # ============================================================
  # REDIS - Cache & Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: kp25-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - kp25-net

networks:
  kp25-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
