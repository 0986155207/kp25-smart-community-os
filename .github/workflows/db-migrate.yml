name: DB Migrate — Áp dụng Supabase migrations

# ── Trigger ──────────────────────────────────────────────────
# LƯU Ý: Database KP25 được quản lý thủ công qua Supabase SQL Editor.
# Migration history (supabase_migrations.schema_migrations) KHÔNG đồng bộ
# với CLI, nên `supabase db push` tự động sẽ xung đột (bảng đã tồn tại).
# Vì vậy workflow này CHỈ chạy thủ công khi cần (không auto-trigger trên push).
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Chạy thử (không thực sự apply migration)'
        required: false
        default: 'true'
        type: boolean
      migration-file:
        description: 'Tên file migration cụ thể (để trống = tất cả)'
        required: false
        default: ''

concurrency:
  group: db-migrate
  cancel-in-progress: false   # Không hủy migration đang chạy

jobs:
  migrate:
    name: 🗄️ Apply Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: database
      url: https://supabase.com/dashboard/project/pnyjrneqxqckclxehaqv

    steps:
      - uses: actions/checkout@v4

      # Cài Supabase CLI
      - name: Cài Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Liệt kê các migration files
      - name: 📋 Liệt kê migrations
        run: |
          echo "## Danh sách migration files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la supabase/migrations/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Dry run (nếu được bật)
      - name: 🔍 Dry run — kiểm tra migrations
        if: github.event.inputs.dry-run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --dry-run \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}
          echo "✅ Dry run hoàn thành — không có lỗi"

      # Áp dụng migration thực sự
      - name: 🚀 Apply migrations
        if: github.event.inputs.dry-run != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "⏳ Đang áp dụng migrations..."
          supabase db push \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Migrations đã được áp dụng thành công" >> $GITHUB_STEP_SUMMARY
          echo "**Thời gian:** $(date '+%H:%M %d/%m/%Y')" >> $GITHUB_STEP_SUMMARY

      # Kiểm tra schema sau migration
      - name: 🔎 Kiểm tra schema sau migration
        if: github.event.inputs.dry-run != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Kiểm tra các bảng chính tồn tại
          supabase db diff \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }} \
            --schema public 2>/dev/null || echo "Schema check completed"
