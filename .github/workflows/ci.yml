name: CI — Kiểm tra chất lượng

# ── Trigger ──────────────────────────────────────────────────
on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Hủy run cũ khi có commit mới cùng branch/PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Env mặc định ─────────────────────────────────────────────
env:
  NODE_VERSION: '20'
  # Biến giả để build không lỗi thiếu env
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
  SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
  GEMINI_API_KEY: 'placeholder-gemini-key'
  NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
  NEXT_PUBLIC_ADMIN_URL: 'http://localhost:3001'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Lint & Type Check
  # ════════════════════════════════════════════════════════════
  lint-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cài dependencies
        run: npm ci --prefer-offline

      - name: Type check — web
        run: npm run type-check --workspace=@kp25/web

      - name: Type check — admin
        run: npm run type-check --workspace=@kp25/admin

      - name: Lint — web
        run: npm run lint --workspace=@kp25/web

      - name: Lint — admin
        run: npm run lint --workspace=@kp25/admin

  # ════════════════════════════════════════════════════════════
  # JOB 2: Unit Tests
  # ════════════════════════════════════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cài dependencies
        run: npm ci --prefer-offline

      - name: Test — web (với coverage)
        run: npm run test:coverage --workspace=@kp25/web

      - name: Test — admin (với coverage)
        run: npm run test:coverage --workspace=@kp25/admin

      - name: Upload coverage — web
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web-${{ github.run_id }}
          path: apps/web/coverage/
          retention-days: 7

      - name: Upload coverage — admin
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-admin-${{ github.run_id }}
          path: apps/admin/coverage/
          retention-days: 7

      # Thêm coverage comment vào PR
      - name: Comment coverage lên PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: apps/web/coverage/coverage-summary.json
          name: 'Web Coverage'

  # ════════════════════════════════════════════════════════════
  # JOB 3: Build check
  # ════════════════════════════════════════════════════════════
  build-check:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-typecheck]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cài dependencies
        run: npm ci --prefer-offline

      # Cache Next.js build
      - name: Cache Next.js builds
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
            apps/admin/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build — web
        run: npm run build --workspace=@kp25/web

      - name: Build — admin
        run: npm run build --workspace=@kp25/admin

  # ════════════════════════════════════════════════════════════
  # STATUS: Gate tổng hợp cho branch protection rules
  # ════════════════════════════════════════════════════════════
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, build-check]
    if: always()
    steps:
      - name: Kiểm tra kết quả
        run: |
          if [[ "${{ needs.lint-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}"    != "success" ]] || \
             [[ "${{ needs.build-check.result }}"   != "success" ]]; then
            echo "❌ CI thất bại — không cho phép merge"
            exit 1
          fi
          echo "✅ Tất cả checks đã pass"
