name: Deploy Production — Triển khai chính thức

# ── Trigger ──────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.env.example'
  # Cho phép trigger thủ công
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Bỏ qua unit tests (chỉ dùng khi khẩn cấp)'
        required: false
        default: 'false'
        type: boolean
      target:
        description: 'Chọn target deploy'
        required: false
        default: 'vercel'
        type: choice
        options:
          - vercel
          - vps
          - both

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Không hủy deploy đang chạy

env:
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: '1'
  REGISTRY: ghcr.io
  IMAGE_WEB:   ghcr.io/${{ github.repository_owner }}/kp25-web
  IMAGE_ADMIN: ghcr.io/${{ github.repository_owner }}/kp25-admin

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Chạy CI đầy đủ trước khi deploy
  # ════════════════════════════════════════════════════════════
  pre-deploy-checks:
    name: 🔎 Pre-deploy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.skip-tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cài dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: |
          npm run type-check --workspace=@kp25/web
          npm run type-check --workspace=@kp25/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Unit tests
        run: |
          npm run test --workspace=@kp25/web
          npm run test --workspace=@kp25/admin
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # ════════════════════════════════════════════════════════════
  # JOB 2a: Deploy Vercel Production
  # ════════════════════════════════════════════════════════════
  deploy-vercel:
    name: 🌐 Deploy Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [pre-deploy-checks]
    if: |
      always() &&
      (needs.pre-deploy-checks.result == 'success' || needs.pre-deploy-checks.result == 'skipped') &&
      (github.event.inputs.target == 'vercel' || github.event.inputs.target == 'both' || github.event.inputs.target == '')

    environment:
      name: production
      url: ${{ steps.deploy-web.outputs.web-url }}

    outputs:
      web-url:   ${{ steps.deploy-web.outputs.web-url }}
      admin-url: ${{ steps.deploy-admin.outputs.admin-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cài dependencies
        run: npm ci --prefer-offline

      - name: Cài Vercel CLI
        run: npm install --global vercel@latest

      # ── Deploy Portal (web) ──────────────────────────────────
      - name: 🏘️ Deploy Portal → Vercel Production
        id: deploy-web
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
        run: |
          cd apps/web
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          WEB_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "web-url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "✅ Portal Production: $WEB_URL"

      # ── Deploy Admin ─────────────────────────────────────────
      - name: ⚙️ Deploy Admin → Vercel Production
        id: deploy-admin
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: |
          cd apps/admin
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          ADMIN_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "admin-url=$ADMIN_URL" >> $GITHUB_OUTPUT
          echo "✅ Admin Production: $ADMIN_URL"

  # ════════════════════════════════════════════════════════════
  # JOB 2b: Build & Push Docker → Deploy VPS
  # ════════════════════════════════════════════════════════════
  deploy-vps:
    name: 🐳 Deploy VPS (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [pre-deploy-checks]
    if: |
      always() &&
      (needs.pre-deploy-checks.result == 'success' || needs.pre-deploy-checks.result == 'skipped') &&
      (github.event.inputs.target == 'vps' || github.event.inputs.target == 'both')

    steps:
      - uses: actions/checkout@v4

      # Login vào GitHub Container Registry
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker Buildx (multi-platform)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lấy Git SHA ngắn
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── Build & Push image web ────────────────────────────────
      - name: 🏗️ Build & Push image — web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}

      # ── Build & Push image admin ──────────────────────────────
      - name: 🏗️ Build & Push image — admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_ADMIN }}:latest
            ${{ env.IMAGE_ADMIN }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=admin
          cache-to:   type=gha,scope=admin,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ── SSH vào VPS, pull image mới và restart ────────────────
      - name: 🖥️ Deploy lên VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kp25

            echo "📥 Pull images mới..."
            docker pull ${{ env.IMAGE_WEB }}:latest
            docker pull ${{ env.IMAGE_ADMIN }}:latest

            echo "♻️ Cập nhật docker-compose.yml với SHA mới..."
            export IMAGE_TAG=${{ steps.vars.outputs.sha }}
            export NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            export NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            export NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"

            echo "🔄 Rolling update (zero-downtime)..."
            docker compose up -d --no-deps --force-recreate web admin

            echo "🧹 Dọn images cũ..."
            docker image prune -f --filter "until=24h"

            echo "✅ Deploy VPS hoàn thành — $(date '+%H:%M %d/%m/%Y')"

  # ════════════════════════════════════════════════════════════
  # JOB 3: Chạy DB migrations sau deploy
  # ════════════════════════════════════════════════════════════
  run-migrations:
    name: 🗄️ Run DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-vercel, deploy-vps]
    if: |
      always() &&
      (needs.deploy-vercel.result == 'success' || needs.deploy-vps.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Cài Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Chạy migrations
        env:
          SUPABASE_ACCESS_TOKEN:  ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:   ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID:    ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase db push --project-ref $SUPABASE_PROJECT_ID \
            --password $SUPABASE_DB_PASSWORD
          echo "✅ Migrations đã áp dụng thành công"

  # ════════════════════════════════════════════════════════════
  # JOB 4: Thông báo kết quả deploy
  # ════════════════════════════════════════════════════════════
  notify-deploy:
    name: 📣 Thông báo Deploy
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-vps, run-migrations]
    if: always()

    steps:
      - name: Tạo deploy summary
        run: |
          VERCEL_STATUS="${{ needs.deploy-vercel.result }}"
          VPS_STATUS="${{ needs.deploy-vps.result }}"
          MIGRATE_STATUS="${{ needs.run-migrations.result }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ACTOR="${{ github.actor }}"

          echo "## 🚀 Deploy Production — KP25 Smart Community OS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$SHA\` — **Bởi:** @$ACTOR" >> $GITHUB_STEP_SUMMARY
          echo "**Thời gian:** $(date '+%H:%M %d/%m/%Y')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Kết quả |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Vercel Deploy    | ${VERCEL_STATUS:-skipped}  |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 VPS Docker       | ${VPS_STATUS:-skipped}    |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ DB Migrations    | ${MIGRATE_STATUS:-skipped} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Portal URL:** ${{ needs.deploy-vercel.outputs.web-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Admin URL:** ${{ needs.deploy-vercel.outputs.admin-url }}" >> $GITHUB_STEP_SUMMARY
